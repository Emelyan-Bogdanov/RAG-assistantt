<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #eee;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }

    .sidebar-header h2 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: #111;
    }

    .sidebar-header p {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: #555;
      border-radius: 10px;
      cursor: default;
    }

    .sidebar-item.active {
      background: #f0f0f0;
      color: #111;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #aaa;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #fff;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 32px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .chat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .chat-dot.online {
      background: #111;
    }

    .chat-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .chat-header span {
      font-size: 13px;
      color: #aaa;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 8px; }

    .message {
      max-width: 70%;
      font-size: 14px;
      line-height: 1.55;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
    }

    .message.user {
      background: #111;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      background: #f0f0f0;
      color: #111;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    .message.bot.typing {
      color: #aaa;
      font-style: italic;
    }

    .chat-input-area {
      padding: 12px 32px 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fff;
      flex-shrink: 0;
    }

    .chat-input-area input {
      flex: 1;
      padding: 13px 20px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 28px;
      outline: none;
      background: #f5f5f5;
      color: #111;
      transition: border .2s, background .2s;
    }

    .chat-input-area input:focus {
      border-color: #bbb;
      background: #fff;
    }

    .chat-input-area button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .15s;
    }

    .chat-input-area button:hover { background: #333; transform: scale(1.05); }
    .chat-input-area button:active { transform: scale(.95); }
    .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .attach-btn { background: transparent !important; color: #888 !important; font-size: 20px !important; width: 40px !important; height: 40px !important; }
    .attach-btn:hover { background: #f0f0f0 !important; color: #111 !important; transform: none !important; }

    .file-preview { padding: 0 32px 8px; display: none; }
    .file-chip { display: inline-flex; align-items: center; gap: 6px; background: #f0f0f0; border: 1px solid #e0e0e0; border-radius: 20px; padding: 4px 12px 4px 10px; font-size: 13px; color: #333; }
    .file-chip .remove-file { cursor: pointer; color: #999; font-size: 15px; line-height: 1; margin-left: 2px; }
    .file-chip .remove-file:hover { color: #e33; }

    .message-indent {
      width: 100%;
      height: 4px;
      flex-shrink: 0;
    }
    /*  style for table if included in response  */ 
    table td {
      outline: solid 1px;
      padding: 5px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Assistant</h2>
      <p>Ask me anything</p>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-item active">&#9679; Chat</div>
      <div class="sidebar-item">&#9679; History</div>
      <div class="sidebar-item">&#9679; Settings</div>
    </nav>
    <div class="sidebar-footer">Cabinet Vecteurs</div>
  </aside>

  <div class="main-content">
    <div class="chat-header">
      <div class="chat-dot online"></div>
      <h3>Chat</h3>
      <span>&middot; online</span>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">Hi! How can I help you today?</div>
      <div class="message-indent"></div>
    </div>

    <div class="file-preview" id="filePreview"></div>

    <div class="chat-input-area">
      <input type="file" id="fileInput" hidden />
      <button class="attach-btn" id="attachBtn" title="Attach a file">&#128206;</button>
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const attachBtn = document.getElementById('attachBtn');
    const filePreview = document.getElementById('filePreview');
    const history = [];
    let attachedFile = null;

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async function () {
      const file = this.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        attachedFile = { name: data.filename, content: data.content, type: data.type };
        filePreview.innerHTML = `<div class="file-chip">&#128196; ${data.filename} <span class="remove-file" onclick="removeFile()">&#10005;</span></div>`;
        filePreview.style.display = 'block';
      } catch (err) {
        alert('Failed to upload file.');
      }
      this.value = '';
    });

    function removeFile() {
      attachedFile = null;
      filePreview.style.display = 'none';
    }

    function addMessage(text, role, isTyping = false) {
      const div = document.createElement('div');
      div.className = `message ${role}${isTyping ? ' typing' : ''}`;
      // div.textContent = text;
      // div.innerHTML = marked.parse(text);;
      div.innerHTML = DOMPurify.sanitize(marked.parse(text));
      
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text && !attachedFile) return;

      let content = text;
      if (attachedFile) {
        const fileContext = `[Fichier joint: ${attachedFile.name}]\n\n--- Contenu du fichier ---\n${attachedFile.content}\n--- Fin du contenu ---\n\n`;
        content = text ? `${fileContext}${text}` : `${fileContext}Voici le fichier que j'ai joint. Peux-tu m'en parler ?`;
      }

      const displayText = content.length > 222 ? content.slice(0, 222) + '...' : content;
      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(displayText, 'user');
      history.push({ role: 'user', content });
      removeFile();

      const typingEl = addMessage('Typing...', 'bot', true);

      try {
        const response = await fetch('http://127.0.0.1:1648', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'online',
            max_tokens: 1000,
            messages: history
          })
        });

        const data = await response.json();
        const reply = data.content?.[0]?.text || 'Sorry, I could not respond.';

        typingEl.remove();
        addMessage(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      } catch (err) {
        typingEl.remove();
        addMessage('Something went wrong. Please try again.', 'bot');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
